<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="style.css" rel="stylesheet">
        <link rel="icon" type="image/png" href="icon.png" sizes="32x32">
    </head>
    <body>
        <img src="icon.png"/><hr>
        <div id="dek-text">
        </div>
        <div id="status-line">
            <p id="mode-display">NORMAL</p>
            <label id="file-name"></label>
            <div id="buttons">
                <button onclick="dek_new(event);">NEW</button>
                <button onclick="dek_save(event)">SAVE</button>
                <button onclick="dek_open(event)">OPEN</button>
                <button onclick="dek_delete(event)">DEL</button>
            </div>
        </div>
    </body>
    <script src="rewrite.js"></script>
</html>
